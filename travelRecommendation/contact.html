<!DOCTYPE html>
<html>
<head>
    <title>Contact Us - TravelBloom</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <nav class="navbar">
      <div class="navbar-brand">
        <img src="https://image.similarpng.com/file/similarpng/very-thumbnail/2021/08/Travel-agency-logo-design-template-on-transparent-background-PNG.png" alt="TravelBloom Logo" class="navbar-logo">
        <span class="navbar-title">TravelBloom</span>
      </div>

      <ul class="navbar-links">
        <li><a href="index.html" id="home-link">Home</a></li>
        <li><a href="about.html" id="about-link">About Us</a></li>
        <li><a href="contact.html" id="contact-link">Contact Us</a></li>
      </ul>
    </nav>

    <section class="contact-hero">
      <div class="social-icons">
        <a href="#"><i class="fa-brands fa-twitter"></i></a>
        <a href="#"><i class="fa-brands fa-facebook"></i></a>
        <a href="#"><i class="fa-brands fa-instagram"></i></a>
        <a href="#"><i class="fa-brands fa-youtube"></i></a>
      </div>

      <div class="contact-text">
        <h1>CONTACT US</h1>
        <p>Get in touch</p>
      </div>

      <form class="contact-form" id="contact-form">
        <input type="text" id="name" name="name" placeholder="Name" required>
        <input type="text" id="lastname" name="lastname" placeholder="Last Name" required>
        <input type="email" id="email" name="email" placeholder="Email" required>
        <textarea id="message" name="message" placeholder="Message" rows="4" required></textarea>
        <button type="submit" class="submit-btn">Submit</button>
      </form>
    </section>

</body>
</html>
